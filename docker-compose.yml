services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wisdomup-backend
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env.docker
    volumes:
      - backend_uploads:/app/uploads
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8001/api
    container_name: wisdomup-admin
    ports:
      - "5001:5001"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_uploads:
